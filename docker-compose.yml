version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  postgres-replica:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - rabbitmq
      - redis

  sfa-service:
    build:
      context: ./services/sfa-service
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - rabbitmq
      - redis

  dms-core-service:
    build:
      context: ./services/dms-core-service
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - rabbitmq
      - redis

  integration-service:
    build:
      context: ./services/integration-service
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - rabbitmq
      - redis

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - rabbitmq
      - redis

volumes:
  pgdata:
