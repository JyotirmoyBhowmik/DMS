openapi: 3.1.0
info:
  title: Finance Service API
  version: 1.0.0
  description: Multi-tenant double-entry ledger accounting and GST-compliant invoicing API for DMS.
paths:
  /api/v1/invoices:
    post:
      summary: Create new tax invoice
      operationId: createInvoice
      parameters:
        - in: header
          name: X-Idempotency-Key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Invoice created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'
        '400':
          description: Validation error
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - invoice number already exists
    get:
      summary: List invoices with pagination and filters
      operationId: listInvoices
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 100
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, ISSUED, PAID, CANCELLED, CREDIT_NOTE]
        - in: query
          name: distributorId
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of invoices
  /api/v1/invoices/{id}:
    get:
      summary: Get invoice detail by ID
      operationId: getInvoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice detail
        '404':
          description: Invoice not found
    put:
      summary: Update invoice status (with optimistic concurrency version check)
      operationId: updateInvoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvoiceRequest'
      responses:
        '200':
          description: Invoice updated
        '409':
          description: Version conflict
components:
  schemas:
    CreateInvoiceRequest:
      type: object
      required:
        - distributorId
        - invoiceNumber
        - dueDate
      properties:
        distributorId:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        invoiceNumber:
          type: string
        grossAmountCents:
          type: integer
          minimum: 0
        discountAmountCents:
          type: integer
          minimum: 0
        taxAmountCents:
          type: integer
          minimum: 0
        netAmountCents:
          type: integer
          minimum: 0
        dueDate:
          type: string
          format: date
    UpdateInvoiceRequest:
      type: object
      required:
        - version
      properties:
        status:
          type: string
          enum: [DRAFT, ISSUED, PAID, CANCELLED, CREDIT_NOTE]
        version:
          type: integer
          minimum: 1
    InvoiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoiceNumber:
          type: string
        status:
          type: string
        netAmountCents:
          type: integer
        version:
          type: integer
