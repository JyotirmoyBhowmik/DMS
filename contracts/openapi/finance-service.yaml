openapi: 3.1.0
info:
  title: Finance Service API
  version: 1.0.0
  description: Multi-tenant double-entry ledger accounting and GST-compliant invoicing API for DMS.
paths:
  /api/v1/invoices:
    post:
      summary: Create new tax invoice
      operationId: createInvoice
      parameters:
        - in: header
          name: X-Idempotency-Key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Invoice created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'
        '400':
          description: Validation error
        '403':
          description: Forbidden - insufficient permissions
        '409':
          description: Conflict - invoice number already exists
    get:
      summary: List invoices with pagination and filters
      operationId: listInvoices
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 100
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, ISSUED, PAID, CANCELLED, CREDIT_NOTE]
        - in: query
          name: distributorId
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of invoices
  /api/v1/invoices/{id}:
    get:
      summary: Get invoice detail by ID
      operationId: getInvoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice detail
        '404':
          description: Invoice not found
    put:
      summary: Update invoice status (with optimistic concurrency version check)
      operationId: updateInvoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvoiceRequest'
      responses:
        '200':
          description: Invoice updated
        '409':
          description: Version conflict

  /api/v1/credit-notes:
    post:
      summary: Create new credit note
      operationId: createCreditNote
      parameters:
        - in: header
          name: X-Idempotency-Key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCreditNoteRequest'
      responses:
        '201':
          description: Credit note created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditNoteResponse'
        '400':
          description: Validation error
        '403':
          description: Forbidden
        '409':
          description: Conflict
    get:
      summary: List credit notes with pagination and filters
      operationId: listCreditNotes
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 100
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, APPROVED, APPLIED, CANCELLED]
      responses:
        '200':
          description: List of credit notes

  /api/v1/credit-notes/{id}:
    get:
      summary: Get credit note detail by ID
      operationId: getCreditNote
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Credit note detail
        '404':
          description: Credit note not found
    put:
      summary: Update credit note status (with optimistic concurrency version check)
      operationId: updateCreditNote
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCreditNoteRequest'
      responses:
        '200':
          description: Credit note updated
        '409':
          description: Version conflict

  /api/v1/debit-notes:
    post:
      summary: Create new debit note
      operationId: createDebitNote
      parameters:
        - in: header
          name: X-Idempotency-Key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDebitNoteRequest'
      responses:
        '201':
          description: Debit note created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebitNoteResponse'
        '400':
          description: Validation error
        '403':
          description: Forbidden
        '409':
          description: Conflict
    get:
      summary: List debit notes with pagination and filters
      operationId: listDebitNotes
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 100
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, APPROVED, APPLIED, CANCELLED]
      responses:
        '200':
          description: List of debit notes

  /api/v1/debit-notes/{id}:
    get:
      summary: Get debit note detail by ID
      operationId: getDebitNote
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Debit note detail
        '404':
          description: Debit note not found
    put:
      summary: Update debit note status (with optimistic concurrency version check)
      operationId: updateDebitNote
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDebitNoteRequest'
      responses:
        '200':
          description: Debit note updated
        '409':
          description: Version conflict

  /api/v1/payments:
    post:
      summary: Create new payment record
      operationId: createPayment
      parameters:
        - in: header
          name: X-Idempotency-Key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Payment record created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Validation error
        '403':
          description: Forbidden
        '409':
          description: Conflict
    get:
      summary: List payments with pagination and filters
      operationId: listPayments
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 100
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, PROCESSING, COMPLETED, FAILED, REFUNDED]
      responses:
        '200':
          description: List of payment records

  /api/v1/payments/{id}:
    get:
      summary: Get payment detail by ID
      operationId: getPayment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment detail
        '404':
          description: Payment not found
    put:
      summary: Update payment status (with optimistic concurrency version check)
      operationId: updatePayment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentRequest'
      responses:
        '200':
          description: Payment updated
        '409':
          description: Version conflict

  /api/v1/collections:
    post:
      summary: Create new collection record
      operationId: createCollection
      parameters:
        - in: header
          name: X-Idempotency-Key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
      responses:
        '201':
          description: Collection record created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponse'
        '400':
          description: Validation error
        '403':
          description: Forbidden
        '409':
          description: Conflict
    get:
      summary: List collections with pagination and filters
      operationId: listCollections
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 100
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, PENDING, COLLECTED, FAILED, CANCELLED]
      responses:
        '200':
          description: List of collection records

  /api/v1/collections/{id}:
    get:
      summary: Get collection detail by ID
      operationId: getCollection
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Collection detail
        '404':
          description: Collection not found
    put:
      summary: Update collection status (with optimistic concurrency version check)
      operationId: updateCollection
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollectionRequest'
      responses:
        '200':
          description: Collection updated
        '409':
          description: Version conflict

components:
  schemas:
    CreateInvoiceRequest:
      type: object
      required:
        - distributorId
        - invoiceNumber
        - dueDate
      properties:
        distributorId:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        invoiceNumber:
          type: string
        grossAmountCents:
          type: integer
          minimum: 0
        discountAmountCents:
          type: integer
          minimum: 0
        taxAmountCents:
          type: integer
          minimum: 0
        netAmountCents:
          type: integer
          minimum: 0
        dueDate:
          type: string
          format: date
    UpdateInvoiceRequest:
      type: object
      required:
        - version
      properties:
        status:
          type: string
          enum: [DRAFT, ISSUED, PAID, CANCELLED, CREDIT_NOTE]
        version:
          type: integer
          minimum: 1
    InvoiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoiceNumber:
          type: string
        status:
          type: string
        netAmountCents:
          type: integer
        version:
          type: integer

    CreateCreditNoteRequest:
      type: object
      required:
        - distributorId
        - creditNoteNumber
        - amountCents
        - reason
      properties:
        distributorId:
          type: string
          format: uuid
        invoiceId:
          type: string
          format: uuid
        creditNoteNumber:
          type: string
        amountCents:
          type: integer
          minimum: 1
        reason:
          type: string
    UpdateCreditNoteRequest:
      type: object
      required:
        - version
      properties:
        status:
          type: string
          enum: [DRAFT, APPROVED, APPLIED, CANCELLED]
        version:
          type: integer
          minimum: 1
    CreditNoteResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        creditNoteNumber:
          type: string
        status:
          type: string
        amountCents:
          type: integer
        version:
          type: integer

    CreateDebitNoteRequest:
      type: object
      required:
        - distributorId
        - debitNoteNumber
        - amountCents
        - reason
      properties:
        distributorId:
          type: string
          format: uuid
        invoiceId:
          type: string
          format: uuid
        debitNoteNumber:
          type: string
        amountCents:
          type: integer
          minimum: 1
        reason:
          type: string
    UpdateDebitNoteRequest:
      type: object
      required:
        - version
      properties:
        status:
          type: string
          enum: [DRAFT, APPROVED, APPLIED, CANCELLED]
        version:
          type: integer
          minimum: 1
    DebitNoteResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        debitNoteNumber:
          type: string
        status:
          type: string
        amountCents:
          type: integer
        version:
          type: integer

    CreatePaymentRequest:
      type: object
      required:
        - distributorId
        - paymentReference
        - amountCents
      properties:
        distributorId:
          type: string
          format: uuid
        invoiceId:
          type: string
          format: uuid
        paymentReference:
          type: string
        amountCents:
          type: integer
          minimum: 1
        paymentMethod:
          type: string
    UpdatePaymentRequest:
      type: object
      required:
        - version
      properties:
        status:
          type: string
          enum: [DRAFT, PROCESSING, COMPLETED, FAILED, REFUNDED]
        version:
          type: integer
          minimum: 1
    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        paymentReference:
          type: string
        status:
          type: string
        amountCents:
          type: integer
        version:
          type: integer

    CreateCollectionRequest:
      type: object
      required:
        - distributorId
        - collectionReference
        - amountCents
      properties:
        distributorId:
          type: string
          format: uuid
        invoiceId:
          type: string
          format: uuid
        collectionReference:
          type: string
        amountCents:
          type: integer
          minimum: 1
        collectionMode:
          type: string
    UpdateCollectionRequest:
      type: object
      required:
        - version
      properties:
        status:
          type: string
          enum: [DRAFT, PENDING, COLLECTED, FAILED, CANCELLED]
        version:
          type: integer
          minimum: 1
    CollectionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        collectionReference:
          type: string
        status:
          type: string
        amountCents:
          type: integer
        version:
          type: integer
