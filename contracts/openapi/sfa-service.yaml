      operationId: listKPIAchievements
      responses:
        '200':
          description: A list of KPI achievement targets
  /kpi-achievements/{id}:
    get:
      summary: Get KPI achievement target details
      operationId: getKPIAchievement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: KPI achievement details
    put:
      summary: Update a KPI achievement target progress / status
      operationId: updateKPIAchievement
      parameters:
        - name: id
