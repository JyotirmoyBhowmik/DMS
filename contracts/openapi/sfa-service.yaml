      operationId: deleteCompetitorCapture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Competitor capture deleted successfully
  /photo-captures:
    post:
      summary: Create a photo capture
      operationId: createPhotoCapture
      requestBody:
        required: true
