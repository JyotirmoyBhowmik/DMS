  /field-reps:
    post:
      summary: Create a field representative
      operationId: createFieldRep
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldRepInput'
      responses:
        '201':
          description: Field representative created successfully
    get:
      summary: List field representatives
      operationId: listFieldReps
      responses:
        '200':
          description: A list of field representatives
  /field-reps/{id}:
    get:
      summary: Get field representative details
      operationId: getFieldRep
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Field representative details
    put:
      summary: Update a field representative
      operationId: updateFieldRep
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldRepInput'
      responses:
        '200':
          description: Field representative updated successfully
  /surveys:
    post:
      summary: Create a survey
      operationId: createSurvey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSurveyInput'
      responses:
        '201':
          description: Survey created successfully
    get:
      summary: List surveys
      operationId: listSurveys
      responses:
        '200':
          description: A list of surveys
  /surveys/{id}:
    get:
      summary: Get survey details
      operationId: getSurvey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Survey details
    put:
      summary: Update a survey
      operationId: updateSurvey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSurveyInput'
      responses:
        '200':
          description: Survey updated successfully
components:
  schemas:
    PlaceOrderInput:
      type: object
      required:
        - outletId
        - items
      properties:
        outletId:
          type: string
          format: uuid
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        notes:
          type: string
    OrderItem:
      type: object
      required:
        - skuId
        - quantity
        - price
      properties:
        skuId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0.01
