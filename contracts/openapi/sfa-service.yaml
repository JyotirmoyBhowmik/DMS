openapi: 3.0.3
info:
  title: Sales Force Automation (SFA) Service API
  version: 1.0.0
  description: High-reliability API for capturing field sales, journey beats, and visits.
paths:
  /orders:
    post:
      summary: Place a new sales order
      operationId: placeOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderInput'
      responses:
        '201':
          description: Order captured successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                    format: uuid
                  status:
                    type: string
  /order-approvals:
    post:
      summary: Create a new order approval request
      operationId: createOrderApproval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderApprovalInput'
      responses:
        '201':
          description: Order approval request created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  approvalId:
                    type: string
                    format: uuid
                  status:
                    type: string
  /order-approvals/{id}:
    put:
      summary: Update order approval status (approve/reject/escalate)
      operationId: updateOrderApproval
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderApprovalInput'
      responses:
        '200':
          description: Order approval updated successfully
    get:
      summary: Retrieve order approval request details
      operationId: getOrderApproval
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order approval request details
  /journey-plans:
    post:
      summary: Create a new beat journey plan
      operationId: createJourneyPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJourneyPlanInput'
      responses:
        '201':
          description: Journey plan created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  planId:
                    type: string
                    format: uuid
                  status:
                    type: string
  /journey-plans/{id}:
    put:
      summary: Update journey plan status or modify stops
      operationId: updateJourneyPlan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJourneyPlanInput'
      responses:
        '200':
          description: Journey plan updated successfully
    get:
      summary: Get details of a journey plan
      operationId: getJourneyPlan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Journey plan details
  /beat-routes:
    post:
      summary: Create a new territory beat route
      operationId: createBeatRoute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBeatRouteInput'
      responses:
        '201':
          description: Beat route created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  beatRouteId:
                    type: string
                    format: uuid
                  status:
                    type: string
  /beat-routes/{id}:
    put:
      summary: Update beat route status, metadata or outlet stop lists
      operationId: updateBeatRoute
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBeatRouteInput'
      responses:
        '200':
          description: Beat route updated successfully
    get:
      summary: Get details of a beat route
      operationId: getBeatRoute
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Beat route details
    delete:
      summary: Delete a beat route
      operationId: deleteBeatRoute
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Beat route deleted successfully
  /visits:
    post:
      summary: Create a new retail outlet visit
      operationId: createVisit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVisitInput'
      responses:
        '201':
          description: Visit created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  visitId:
                    type: string
                    format: uuid
                  status:
                    type: string
    get:
      summary: List visits
      operationId: listVisits
      responses:
        '200':
          description: List of visits
  /visits/{id}:
    put:
      summary: Update visit status or record tasks
      operationId: updateVisit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVisitInput'
      responses:
        '200':
          description: Visit updated successfully
    get:
      summary: Get details of a visit
      operationId: getVisit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Visit details
  /attendance:
    post:
      summary: Create a daily attendance record
      operationId: createAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttendanceInput'
      responses:
        '201':
          description: Attendance created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  attendanceId:
                    type: string
                    format: uuid
                  status:
                    type: string
    get:
      summary: List attendance records
      operationId: listAttendances
      responses:
        '200':
          description: List of attendance records
  /attendance/{id}:
    put:
      summary: Update attendance state (check-in, check-out, approve, set leave)
      operationId: updateAttendance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttendanceInput'
      responses:
        '200':
          description: Attendance updated successfully
    get:
      summary: Get details of an attendance record
      operationId: getAttendance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Attendance details
  /geo-check-in:
    post:
      summary: Create a daily geo-checkin record
      operationId: createGeoCheckIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGeoCheckInInput'
      responses:
        '201':
          description: GeoCheckIn created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  geoCheckInId:
                    type: string
                    format: uuid
                  isWithinGeofence:
                    type: boolean
    get:
      summary: List geo-checkin records
      operationId: listGeoCheckIns
      responses:
        '200':
          description: List of geo-checkin records
  /geo-check-in/{id}:
    put:
      summary: Update geo-checkin state (check-out, flag spoofing)
      operationId: updateGeoCheckIn
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGeoCheckInInput'
      responses:
        '200':
          description: GeoCheckIn updated successfully
    get:
      summary: Get details of a geo-checkin record
      operationId: getGeoCheckIn
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: GeoCheckIn details
  /outlet-census:
    post:
      summary: Create a new outlet census record
      operationId: createOutletCensus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOutletCensusInput'
      responses:
        '201':
          description: OutletCensus created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  outletCensusId:
                    type: string
                    format: uuid
                  status:
                    type: string
        '409':
          description: Conflict (census already exists for outlet)
    get:
      summary: List outlet census records
      operationId: listOutletCensuses
      responses:
        '200':
          description: List of outlet census records
  /outlet-census/{id}:
    put:
      summary: Update outlet census state or details
      operationId: updateOutletCensus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOutletCensusInput'
      responses:
        '200':
          description: OutletCensus updated successfully
    get:
      summary: Get details of an outlet census record
      operationId: getOutletCensus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OutletCensus details
  /outlet-profile:
    post:
      summary: Create a new outlet profile
      operationId: createOutletProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - outletName
                - outletType
                - ownerName
                - ownerPhone
                - address
                - geoCoords
              properties:
                outletName:
                  type: string
                outletType:
                  type: string
                  enum: [kirana, supermarket, pharmacy, general]
                ownerName:
                  type: string
                ownerPhone:
                  type: string
                address:
                  type: string
                geoCoords:
                  type: object
                  properties:
                    latitude:
                      type: number
                    longitude:
                      type: number
      responses:
        '201':
          description: OutletProfile created
    get:
      summary: List outlet profiles
      operationId: listOutletProfiles
      responses:
        '200':
          description: List of outlet profiles
  /outlet-profile/{id}:
    put:
      summary: Update outlet profile details
      operationId: updateOutletProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OutletProfile updated successfully
    get:
      summary: Get details of an outlet profile
      operationId: getOutletProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OutletProfile details
    delete:
      summary: Delete an outlet profile
      operationId: deleteOutletProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        '200':
          description: OutletProfile deleted successfully
  /van-sales:
    post:
      summary: Create a new van sale session
      operationId: createVanSale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - agentId
                - vehicleId
                - routeId
                - date
              properties:
                agentId:
                  type: string
                  format: uuid
                vehicleId:
                  type: string
                  format: uuid
                routeId:
                  type: string
                  format: uuid
                date:
                  type: string
                  format: date
                loadedItems:
                  type: array
                  items:
                    type: object
      responses:
        '201':
          description: VanSale session created
    get:
      summary: List van sale sessions
      operationId: listVanSales
      responses:
        '200':
          description: List of van sale sessions
  /van-sales/{id}:
    put:
      summary: Update van sale session ( spot sales, returns, state transitions)
      operationId: updateVanSale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: VanSale updated successfully
    get:
      summary: Get details of a van sale session
      operationId: getVanSale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: VanSale details
    delete:
      summary: Delete a van sale session
      operationId: deleteVanSale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: VanSale deleted successfully
  /delivery-confirmations:
    post:
      summary: Create a delivery confirmation
      operationId: createDeliveryConfirmation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeliveryConfirmationInput'
      responses:
        '201':
          description: Delivery confirmation created successfully
    get:
      summary: List delivery confirmations
      operationId: listDeliveryConfirmations
      responses:
        '200':
          description: A list of delivery confirmations
  /delivery-confirmations/{id}:
    get:
      summary: Get delivery confirmation details
      operationId: getDeliveryConfirmation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Delivery confirmation details
    put:
      summary: Update a delivery confirmation
      operationId: updateDeliveryConfirmation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeliveryConfirmationInput'
      responses:
        '200':
          description: Delivery confirmation updated successfully
    delete:
      summary: Delete a delivery confirmation
      operationId: deleteDeliveryConfirmation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Delivery confirmation deleted successfully
  /merchandising-audits:
    post:
      summary: Create a merchandising audit
      operationId: createMerchandisingAudit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMerchandisingAuditInput'
      responses:
        '201':
          description: Merchandising audit created successfully
    get:
      summary: List merchandising audits
      operationId: listMerchandisingAudits
      responses:
        '200':
          description: A list of merchandising audits
  /merchandising-audits/{id}:
    get:
      summary: Get merchandising audit details
      operationId: getMerchandisingAudit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Merchandising audit details
    put:
      summary: Update a merchandising audit
      operationId: updateMerchandisingAudit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMerchandisingAuditInput'
      responses:
        '200':
          description: Merchandising audit updated successfully
    delete:
      summary: Delete a merchandising audit
      operationId: deleteMerchandisingAudit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Merchandising audit deleted successfully
  /competitor-captures:
    post:
      summary: Create a competitor capture
      operationId: createCompetitorCapture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompetitorCaptureInput'
      responses:
        '201':
          description: Competitor capture created successfully
    get:
      summary: List competitor captures
      operationId: listCompetitorCaptures
      responses:
        '200':
          description: A list of competitor captures
  /competitor-captures/{id}:
    get:
      summary: Get competitor capture details
      operationId: getCompetitorCapture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Competitor capture details
    put:
      summary: Update a competitor capture
      operationId: updateCompetitorCapture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompetitorCaptureInput'
      responses:
        '200':
          description: Competitor capture updated successfully
    delete:
