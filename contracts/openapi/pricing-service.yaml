openapi: 3.0.3
info:
  title: Pricing Service API
  version: 1.0.0
  description: Production OpenAPI contract for PriceLists, discount structures, and promotional pricing schemes.
paths:
  /price-lists:
    post:
      summary: Create a product pricing list
      operationId: createPriceList
      responses:
        '201':
          description: Price list created successfully
        '409':
          description: Duplicate price list code conflict
    get:
      summary: List price lists with status and currency filters
      operationId: listPriceLists
      responses:
        '200':
          description: Paginated price lists

  /price-slabs:
    post:
      summary: Create a quantity tier pricing slab rule
      operationId: createPriceSlab
      responses:
        '201':
          description: Price slab rule created successfully
        '400':
          description: Invalid quantity tier bounds
    get:
      summary: List price slabs with status, priceListId, and skuId filters
      operationId: listPriceSlabs
      responses:
        '200':
          description: Paginated price slabs list

  /geo-price-rules:
    post:
      summary: Create a region-specific geographic pricing rule
      operationId: createGeoPriceRule
      responses:
        '201':
          description: Geo price rule created successfully
        '409':
          description: Duplicate region code conflict
    get:
      summary: List geo price rules with status, priceListId, and regionCode filters
      operationId: listGeoPriceRules
      responses:
        '200':
          description: Paginated geo price rules list


