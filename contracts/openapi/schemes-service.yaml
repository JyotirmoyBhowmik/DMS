openapi: 3.0.3
info:
  title: Schemes Service API
  version: 1.0.0
  description: OpenAPI 3.0 spec for DMS Schemes Service managing trade and promotional scheme rules.

paths:
  /schemes:
    post:
      summary: Create a promotional scheme
      operationId: createScheme
      responses:
        '201':
          description: Scheme created successfully
        '409':
          description: Duplicate scheme code conflict
    get:
      summary: List schemes with status, schemeType, and code filters
      operationId: listSchemes
      responses:
        '200':
          description: Paginated schemes list

  /scheme-promotions:
    post:
      summary: Create a promotional campaign for a scheme
      operationId: createSchemePromotion
      responses:
        '201':
          description: Scheme promotion created successfully
        '409':
          description: Duplicate promo code conflict
    get:
      summary: List scheme promotions with status, schemeId, and promoCode filters
      operationId: listSchemePromotions
      responses:
        '200':
          description: Paginated scheme promotions list

  /eligibility-rules:
    post:
      summary: Create an eligibility rule for a scheme
      operationId: createEligibilityRule
      responses:
        '201':
          description: Eligibility rule created successfully
        '409':
          description: Duplicate rule code conflict
    get:
      summary: List eligibility rules with status, schemeId, and ruleCode filters
      operationId: listEligibilityRules
      responses:
        '200':
          description: Paginated eligibility rules list


