# =============================================================================
# PgBouncer Connection Pooler Configuration
# Establishes per-role connection pooling (transaction mode) for
# the multi-tenant distributor and agent service roles.
# =============================================================================

[databases]
# Connect to the main database container
dms_db = host=postgres port=5432 dbname=dms_db

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
logfile = /var/log/postgresql/pgbouncer.log
pidfile = /var/run/postgresql/pgbouncer.pid
admin_users = postgres, dms_admin
stats_users = monitoring

# Resource Limits & Pooling Policies
pool_mode = transaction
max_client_conn = 2000
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 5
max_db_connections = 100

# Client connection timeout limits
query_timeout = 30
client_idle_timeout = 60
connection_lifetime = 600

# Per-role / Per-user connection pools to isolate client workload
# (limits agent reads vs. heavy admin analytics queries)
[users]
dms_admin = max_user_connections=50
dms_agent = max_user_connections=20
dms_distributor = max_user_connections=20
dms_auditor = max_user_connections=10
